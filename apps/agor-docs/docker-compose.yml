# Dev compose for the Agor docs site.
#
# Used by the `docs` variant in .agor.yml. Compose project name is
# namespaced per-branch so multiple branches can run side by side.
#
# Override the host port by exporting PORT before `docker compose up`
# (the .agor.yml variant does this via {{add 7000 branch.unique_id}}).

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${PORT:-3001}:3001'
    volumes:
      # Bind-mount source for hot reload.
      - .:/app
      # Anonymous volume shadows /app/node_modules so the host (which has no
      # node_modules) doesn't clobber the image's install.
      - /app/node_modules
      - /app/.next
    command: pnpm exec next dev -H 0.0.0.0 -p 3001
    restart: unless-stopped
